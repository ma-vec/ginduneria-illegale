<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bottle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="./css/style-bottle.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>

<body>
    <a id="back-home" href="./index.html">&#8592; Home</a>
    <button id="prev-bottle" class="nav-arrow nav-arrow-left" title="Bottiglia precedente">&#8592;</button>
    <button id="next-bottle" class="nav-arrow nav-arrow-right" title="Bottiglia successiva">&#8594;</button>
    <div id="bottle-info">
        <div id="mini-map"></div>
        <h1 id="nome-bottiglia"></h1>
        <h3 id="ifEmpty"></h3>
        <h3 id="pos"></h3>
        <h3 id="botanic"></h3>
        <h3 id="limited"></h3>
        <img id="bottle-image" src="" alt="Immagine della bottiglia">
        <h3 id="aggettivi"></h3>
    </div>

    <div id="radar-section">
        <span>
            <button id="add-tonic-btn">+ Aggiungi tonica</button>
            <canvas id="radarChart"></canvas>
            <div class="tonic-table-wrapper">
            <table class="tonic-table">
                <tbody id="tonic-table-body"></tbody>
            </table>
            </div>
        </span>
    </div>

    <div id="etichaldiv" class="ethical-section">
        <h2 class="section-title">Indice Etico</h2>
        <div class="ethical-header">
            <h2 id="etValue"></h2>
            <h3 id="etRating"></h3>
        </div>
        <p id="etDescription"></p>
        
        <div class="ethical-bars-container">
            <div class="ethical-bar-group">
                <span class="ethical-label">Ambiente</span>
                <div class="ethical-bar"><div id="etAmbiente" class="ethical-fill"></div></div>
                <span class="ethical-number" id="etAmbienteNum"></span>
            </div>
            <div class="ethical-bar-group">
                <span class="ethical-label">Sociale</span>
                <div class="ethical-bar"><div id="etSociale" class="ethical-fill"></div></div>
                <span class="ethical-number" id="etSocialeNum"></span>
            </div>
            <div class="ethical-bar-group">
                <span class="ethical-label">Tradizione</span>
                <div class="ethical-bar"><div id="etTradizione" class="ethical-fill"></div></div>
                <span class="ethical-number" id="etTradizioneNum"></span>
            </div>
        </div>
    </div>

    <div id="political-section">
        <figure class="highcharts-figure">
            <div id="parliament-chart"></div>
        </figure>
        <p id="nomeParl">Parlamentare: </p>
        <p id="paragAreaP">Appartenenza: </p>
        <p id="motPol">Ideologia: </p>
    </div>

    <div id="bottle-profile">
        <p id="profile"></p>
    </div>

    <!-- Leaflet (mini-map) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Political chart -->
    <script src="https://cdn.jsdelivr.net/npm/highcharts@11/highcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highcharts@11/modules/item-series.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highcharts@11/modules/accessibility.js"></script>
    <script type="module" defer>
    import { polyfillCountryFlagEmojis } from "https://cdn.skypack.dev/country-flag-emoji-polyfill";
    polyfillCountryFlagEmojis();
    </script>

    <script src="./js/script-bottle.js" defer></script> <!-- Carica lo script dopo il DOM -->
</body>
</html>
